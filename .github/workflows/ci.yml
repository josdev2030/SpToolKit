name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x

      - name: Restore
        run: dotnet restore SpToolkit.slnx

      - name: Build
        run: dotnet build SpToolkit.slnx -c Release --no-restore /p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test SpToolkit.slnx -c Release --no-build --no-restore --verbosity normal
